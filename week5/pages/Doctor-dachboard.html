<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Doctor Dashboard</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body style="
    background-image: url('images/bg.jpeg');
    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;
    height: 100vh;
">

<!-- Centered Container -->
<div class="d-flex justify-content-center align-items-center" style="height: 100vh;">

    <!-- Main Box -->
    <div class="card shadow p-4" style="width: 800px; max-height: 90vh; overflow-y: auto;">

        <!-- Header -->
        <div class="d-flex justify-content-between align-items-center mb-3">
            <h3>Doctor Dashboard</h3>
            <a href="login.html" class="btn btn-secondary btn-sm">Logout</a>
        </div>

        <hr>

        <!-- Appointment 1 -->
        <div class="card mb-3">
            <div class="card-body">
                <h5>Patient: Lama</h5>
                <p><strong>Date:</strong> 2025-05-20</p>
                <p><strong>Time:</strong> 10:00 AM</p>
                <p><strong>Notes:</strong> General Checkup</p>

                <div class="mb-2">
                    <label>Status:</label>
                    <select class="form-select">
                        <option>Pending</option>
                        <option>Confirmed</option>
                        <option>Completed</option>
                        <option>Cancelled</option>
                    </select>
                </div>

                <button class="btn btn-primary btn-sm">Update</button>
            </div>
        </div>

        <!-- Appointment 2 -->
        <div class="card mb-3">
            <div class="card-body">
                <h5>Patient: Ahmad</h5>
                <p><strong>Date:</strong> 2025-05-22</p>
                <p><strong>Time:</strong> 12:30 PM</p>
                <p><strong>Notes:</strong> Skin Consultation</p>

                <div class="mb-2">
                    <label>Status:</label>
                    <select class="form-select">
                        <option>Pending</option>
                        <option selected>Confirmed</option>
                        <option>Completed</option>
                        <option>Cancelled</option>
                    </select>
                </div>

                <button class="btn btn-primary btn-sm">Update</button>
            </div>
        </div>

    </div>

</div>

</body>
</html>
