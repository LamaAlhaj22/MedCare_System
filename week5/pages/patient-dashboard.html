<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Patient Dashboard</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body style="
    background-image: url('images/bg.jpeg');
    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;
    height: 100vh;
">

<div class="d-flex justify-content-center align-items-center" style="height: 100vh;">

    <div class="card shadow p-4" style="width: 800px; max-height: 90vh; overflow-y: auto;">

        <!-- Header -->
        <div class="d-flex justify-content-between align-items-center mb-3">
            <h3>Patient Dashboard</h3>

            <div>
                <a href="#" class="btn btn-outline-primary btn-sm">Profile</a>
                <a href="my-appointments.html" class="btn btn-outline-secondary btn-sm">My Appointments</a>
            </div>
        </div>

        <hr>

        <!-- Filter -->
        <div class="mb-4">
            <label class="form-label">Filter by Specialty</label>
            <select class="form-select">
                <option selected>Choose Specialty</option>
                <option>Cardiology</option>
                <option>Dermatology</option>
                <option>Neurology</option>
            </select>
        </div>

        <!-- Doctors -->

        <div class="card mb-3">
            <div class="card-body">
                <h5>Dr. Ahmad</h5>
                <p>Specialty: Cardiology</p>
                <p>Available: Monday 9:00 AM - 2:00 PM</p>
                <a href="book-appointment.html" class="btn btn-primary">Book Appointment</a>
            </div>
        </div>

        <div class="card mb-3">
            <div class="card-body">
                <h5>Dr. Lina</h5>
                <p>Specialty: Dermatology</p>
                <p>Available: Tuesday 10:00 AM - 3:00 PM</p>
                <a href="book-appointment.html" class="btn btn-primary">Book Appointment</a>
            </div>
        </div>

    </div>

</div>

</body>
</html>
